<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto - Juegos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/ada462c236.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="content">
    <i class="fa-solid fa-gamepad"></i>
    <h1>¡Hola! ¿Cómo te llamas?</h1>
    <section>

      <p class="bienvenida">Bienvenido a TriviaBlast. Introduce tu apodo para comenzar a competir en los rankings globales.</p>

      <div class="input-box">
        <input type="text" id="input-nombre" placeholder="Escribe tu nombre...">
        <button id="btn-guardar">EMPEZAR</button>
      </div>

      <p class="guardarlocalmente">Su nombre se guardará localmente en este dispositivo.</p>

    </section>
  </div>

  <script>
    const inputNombre = document.querySelector("#input-nombre");
    const saludo = document.querySelector("#saludo");
    const btnGuardar = document.querySelector("#btn-guardar");

    const nombreGuardado = localStorage.getItem('nombreUsuario');

    if (nombreGuardado) {
      console.log('Ingresado.')
    }

    btnGuardar.addEventListener("click", () => {
      const nombreIngresado = inputNombre.value.trim();
      if (nombreIngresado !== "") {
        localStorage.setItem('nombreUsuario', nombreIngresado);
      }
    });
  </script>
</body>

</html>
