<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto - Juegos</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 400px;
      margin: 60px auto;
      padding: 0 20px;
    }

    input {
      padding: 8px;
      font-size: 1rem;
      width: 200px;
    }

    button {
      padding: 8px 16px;
      font-size: 1rem;
      cursor: pointer;
      margin-left: 8px;
    }

    #saludo {
      margin-top: 24px;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <h1>Hola ¿Cómo te llamás?</h1>

  <input type="text" id="input-nombre" placeholder="Tu nombre">
  <button id="btn-guardar">EMPEZAR</button>

  <p id="saludo">tu nombre se guardara localmente en este dispositivo.</p>

  <script>
    const inputNombre = document.querySelector("#input-nombre");
    const saludo = document.querySelector("#saludo");
    const btnGuardar = document.querySelector("#btn-guardar");

    const nombreGuardado = localStorage.getItem('nombreUsuario');

    if (nombreGuardado) {
      console.log('Ingresado.')
    }

    btnGuardar.addEventListener("click", () => {
      const nombreIngresado = inputNombre.value.trim();
      if (nombreIngresado !== "") {
        localStorage.setItem('nombreUsuario', nombreIngresado);
      }
    });
  </script>
</body>

</html>
